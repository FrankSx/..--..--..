          font-family="'Courier New', monospace" font-size="14" 
          fill="url(#gold-grad)" font-weight="bold" filter="url(#glow)">
      frankSx
    </text>

    <!-- Subtitle -->
    <text id="role-text" x="105" y="45" text-anchor="middle"
          font-family="'Courier New', monospace" font-size="6"
          fill="#00d4ff" opacity="0.9">
      Hardware &amp; Software Security Researcher
