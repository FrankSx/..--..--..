<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="210mm" height="297mm" viewBox="0 0 210 297"
     id="resume-artifact" version="1.1"
     onload="initResume()">

  <title>frankSx — Technical Security Researcher</title>
  <desc>PDF 2.0 + SVG + JavaScript Resume Artifact. Demonstrates polyglot format understanding, embedded systems expertise, and offensive security research.</desc>

  <defs>
    <!-- Gradient Definitions -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2cbf;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:1" />
    </linearGradient>

    <!-- Circuit Pattern -->
    <pattern id="circuit" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1.5" fill="#00d4ff" opacity="0.3"/>
      <path d="M 10 0 L 10 8 M 10 12 L 10 20 M 0 10 L 8 10 M 12 10 L 20 10" 
            stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Hex Grid -->
    <pattern id="hexgrid" x="0" y="0" width="30" height="26" patternUnits="userSpaceOnUse">
      <path d="M15 0 L30 8.66 L30 25.98 L15 34.64 L0 25.98 L0 8.66 Z" 
            fill="none" stroke="#00d4ff" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background Layer -->
  <rect width="210" height="297" fill="url(#bg-grad)" />
  <rect width="210" height="297" fill="url(#hexgrid)" />
  <rect width="210" height="297" fill="url(#circuit)" />

  <!-- Animated Border Frame -->
  <rect id="border-frame" x="5" y="5" width="200" height="287" 
        fill="none" stroke="url(#accent-grad)" stroke-width="0.5" rx="5" 
        filter="url(#glow)" opacity="0.8"/>

  <!-- Corner Accents -->
  <g id="corners" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 10 25 L 10 15 L 20 15" />
    <path d="M 190 25 L 190 15 L 180 15" />
    <path d="M 10 272 L 10 282 L 20 282" />
    <path d="M 190 272 L 190 282 L 180 282" />
  </g>

  <!-- Header Section -->
  <g id="header" transform="translate(0, 20)">
    <!-- Name -->
